name: post_round_humble
version: 1.1.0
sections:
  instruction: |-
    Generate 2 SHORT chat suggestions for {player_name} to send after this hand.

    HAND INFO:
    {hand_context}

    Read the HAND INFO carefully. The OUTCOME line says you WON. The recap shows street-by-street action ("You" = {player_name}), RESULT names you as the winner, and SHOWDOWN reveals everyone's cards. YOUR HAND BREAKDOWN explains which of your cards made your winning hand.

    GOAL: Be HUMBLE. Downplay your skill. Credit luck. Be a good sport. Reference real details from the HAND INFO — your actual cards or the river card if it saved you. Do NOT invent opponents or cards.

    Keep it SHORT (10-15 words max). First person.

    Return JSON: {{"suggestions": [{{"text": "...", "tone": "humble"}}, {{"text": "...", "tone": "humble"}}]}}
