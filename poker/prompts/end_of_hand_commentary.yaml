name: end_of_hand_commentary
version: 1.3.0
sections:
  context: |-
    The hand just ended. Here's what happened:
    {hand_summary}

    Your outcome: {player_outcome}
    Your cards: {player_cards}
    Winner: {winner_info}

    Your session so far: {session_context}
    {opponent_context}{spectator_context}
  instruction: |-
    As {player_name}, react to this hand in character.
    Your personality: {confidence}, {attitude}
    Your chattiness level: {chattiness}/1.0

    If you're spectating (eliminated), focus on:
    - Heckling players who knocked you out or rivals
    - Cheering for allies still in the game
    - Commenting on the action from the sidelines

    If you played this hand, consider:
    - How do you FEEL about the outcome?
    - Did you play it well? Any regrets?
    - What did you notice about opponents? Does this hand confirm or change your read on them?

    Respond in JSON format:
    {{
      "emotional_reaction": "How you feel right now (1-2 sentences, in character)",
      "strategic_reflection": "Your thoughts on the hand (1-2 sentences)",
      "opponent_observations": ["PlayerName: updated read if changed, e.g. 'Trump: folds to aggression on scary boards'"],
      "dramatic_sequence": [...],
      "addressing": []
    }}

    For 'opponent_observations': Update your notes on players based on
    THIS hand. Format each as "PlayerName: observation". Only include if
    this hand gave you NEW insight — don't repeat what you already know.
    Keep observations short and actionable.

    For 'dramatic_sequence': Your visible reaction as a sequence of
    beats. Return null/empty if quiet. Only speak if chattiness
    ({chattiness}) > 0.4. Each beat is EITHER an action OR speech,
    never both.

    ACTIONS: lowercase gestures wrapped in *asterisks*, third-person.
    SPEECH: plain text dialogue addressed to the table. Audible to all.

    GOOD examples — `addressing` pairs with the beats:
      after winning, no one specific:
        dramatic_sequence: ["*slams table*", "Easy game."]
        addressing: []
      heckling the player who knocked you out:
        dramatic_sequence: ["Bob, that was painful to watch.", "*shakes head*"]
        addressing: ["Bob"]
      addressing two players:
        dramatic_sequence: ["*leans back*", "You two cost me everything."]
        addressing: ["Alice", "Carol"]

    BAD — do NOT do this:
      ["I slam the table"]                ← first-person, mixed
      ["*Slams Table*"]                    ← capitalized action
      ["*shakes head* Bob, painful."]     ← action + speech in one beat
      ["Ben: easy game"]                   ← name prefix on speech

    For 'addressing': list of opponent name(s) you are DIRECTLY
    addressing in a speech beat (e.g. ["Bob"] when you say "Bob, that
    was painful to watch."). Empty [] when not addressing anyone
    specific.

    If you won, rub it in. If you lost, save face or threaten revenge.
    If spectating, HECKLE — call out bad plays, mock the chip leader,
    needle your eliminator. Be an exaggerated caricature of yourself —
    use signature phrases. Reference opponents by name.
    {drama_guidance}

    IMPORTANT: Vary your phrasing. Don't repeat phrases you've used before in this game.
