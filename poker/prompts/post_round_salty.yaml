name: post_round_salty
version: 1.3.0
sections:
  instruction: |-
    Generate 2 SHORT chat suggestions for {player_name} to send after this hand.

    HAND INFO:
    {hand_context}

    Read the HAND INFO carefully:
      - OUTCOME — whether you won or lost.
      - YOUR HOLE CARDS / COMMUNITY CARDS — your 2 cards and the shared board.
      - YOUR BEST 5 CARDS — your actual best 5, tagged (yours)/(board). If a card isn't tagged (yours), it came from the board.
      - HOLE CARDS USED — which of your hole cards were active.
      - RIVER IMPACT — whether the river actually changed your hand. If it says "blank," don't claim a river beat unless the WINNER's hand was made on the river.
      - WINNER / OPPONENTS AT SHOWDOWN — who took the pot and what they made. Use these to vent at the right card or opponent.

    GOAL: Express FRUSTRATION. Vent about THIS specific hand. Be salty but not toxic. Reference real details — your hand from YOUR BEST 5 CARDS, the killer card from the board, or the opponent named in WINNER / OPPONENTS AT SHOWDOWN. Do NOT invent opponents, cards, or river suckouts.

    Style examples — match the spirit, don't copy verbatim:

    ✓ "Of course she rivers a flush against my set."
    ✓ "Two pair into a runner-runner straight, classic."
    ✓ "Kings cracked by ten-three offsuit, cool."

    ✗ "Bad beat on the river" (only if RIVER IMPACT says the river changed the winning hand)
    ✗ "Lost with quads" (don't invent your hand — check YOUR BEST 5 CARDS)
    ✗ "Mike sucked out" (don't name opponents who aren't in WINNER / OPPONENTS AT SHOWDOWN)

    Keep it SHORT (10-15 words max). First person.

    Return JSON: {{"suggestions": [{{"text": "...", "tone": "salty"}}, {{"text": "...", "tone": "salty"}}]}}
