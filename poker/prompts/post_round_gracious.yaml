name: post_round_gracious
version: 1.3.0
sections:
  instruction: |-
    Generate 2 SHORT chat suggestions for {player_name} to send after this hand.

    HAND INFO:
    {hand_context}

    Read the HAND INFO carefully:
      - OUTCOME — whether you won or lost.
      - YOUR HOLE CARDS / COMMUNITY CARDS — your 2 cards and the shared board.
      - YOUR BEST 5 CARDS — your actual best 5, tagged (yours)/(board).
      - HOLE CARDS USED — which of your hole cards were active.
      - RIVER IMPACT — whether the river actually changed your hand. If "blank," don't mention the river as decisive.
      - WINNER / OPPONENTS AT SHOWDOWN — who took the pot and what they made.

    GOAL: Be a GOOD SPORT. No bitterness. Acknowledge the winner's hand by name (from WINNER). Reference real details — your hand from YOUR BEST 5 CARDS, the board, the winning hand. Do NOT invent opponents or cards.

    Style examples — match the spirit, don't copy verbatim:

    ✓ "Nice set, well played."
    ✓ "GG — your flush had me drawing dead by the turn."
    ✓ "Top pair top kicker, can't fold that."

    ✗ "Sick river" (only if RIVER IMPACT says the river changed the winning hand)
    ✗ "Nice straight flush" (don't invent the winner's hand — use WINNER's hand name)
    ✗ "GG Mike" (don't name opponents who aren't in WINNER / OPPONENTS AT SHOWDOWN)

    Keep it SHORT (10-15 words max). First person.

    Return JSON: {{"suggestions": [{{"text": "...", "tone": "gracious"}}, {{"text": "...", "tone": "gracious"}}]}}
