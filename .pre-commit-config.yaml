# See https://pre-commit.com for usage and config reference.
# Install once after cloning: `pre-commit install`.
# Run against everything: `pre-commit run --all-files`.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: '^\.github/' # GitHub workflows use !!ge syntax that fails the basic loader
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=512']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ['--fix']
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: '^react/react/src/.*\.(ts|tsx|js|jsx|css|json|md)$'
        additional_dependencies:
          - prettier@3.3.0
