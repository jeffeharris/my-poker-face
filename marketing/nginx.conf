server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (mirrors the frontend). The marketing site loads Google
    # Fonts via <link> (no service worker here, so this is a plain stylesheet/
    # font fetch — allowed via style-src/font-src). Inline scripts: Astro's
    # island-hydration bootstrap + our IntersectionObserver snippets need
    # 'unsafe-inline'. Form posts to the same-origin API → connect-src 'self'.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self'" always;

    # Hashed, content-addressed build output — cache hard.
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Static pages. Astro 'directory' format → /opponents/x/ resolves to
    # /opponents/x/index.html. 404 (no SPA fallback — this isn't an SPA).
    location / {
        try_files $uri $uri/ =404;
    }
}
