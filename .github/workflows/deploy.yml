name: Test and Deploy

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'E2E test mode (mock = browser mocks, real = full stack)'
        required: false
        default: 'mock'
        type: choice
        options:
          - mock
          - real

jobs:
  lint-backend:
    name: Lint Backend (Python — ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install 'ruff~=0.7.0'

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check . --output-format=github

  test-backend:
    name: Test Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -n auto -v --tb=short --cov=poker --cov=flask_app --cov=core --cov-report=term-missing:skip-covered --cov-fail-under=40
        env:
          PYTHONPATH: ${{ github.workspace }}
          FLASK_ENV: 'development'
          FLASK_DEBUG: '1'
          SECRET_KEY: 'test-secret-key-for-ci'
          OPENAI_API_KEY: 'test-key-for-ci'
          DEEPSEEK_API_KEY: 'test-key-for-ci'
          GROQ_API_KEY: 'test-key-for-ci'
          CORS_ORIGINS: 'http://localhost:5173'

  test-frontend:
    name: Test Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: react/react/package-lock.json

      - name: Install dependencies
        working-directory: react/react
        run: npm ci

      - name: Lint
        working-directory: react/react
        run: npm run lint -- --max-warnings=0

      - name: Format check (Prettier)
        working-directory: react/react
        run: npm run format:check

      - name: Type check
        working-directory: react/react
        run: npm run typecheck

      - name: Build
        working-directory: react/react
        run: npm run build

      - name: Run Vitest
        working-directory: react/react
        run: npx vitest run --reporter=verbose

  test-e2e:
    name: Test E2E (Playwright)
    runs-on: ubuntu-latest
    # Only run E2E when:
    # - Pushed to main
    # - Manual trigger
    # - PR is marked ready for review (with frontend/backend changes)
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action == 'ready_for_review')
    steps:
      - uses: actions/checkout@v6

      - name: Check for relevant changes
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            e2e_relevant:
              - 'react/**'
              - 'flask_app/**'

      - name: Skip if no relevant changes
        if: github.event_name == 'pull_request' && steps.filter.outputs.e2e_relevant != 'true'
        run: echo "No changes to react/** or flask_app/**, skipping E2E tests"

      - name: Create test environment file
        if: github.event_name != 'pull_request' || steps.filter.outputs.e2e_relevant == 'true'
        run: |
          printf '%s\n' \
            'FLASK_ENV=development' \
            'FLASK_DEBUG=1' \
            'SECRET_KEY=test-secret-key-for-ci' \
            'OPENAI_API_KEY=test-key-for-ci' \
            'DEEPSEEK_API_KEY=test-key-for-ci' \
            'GOOGLE_CLIENT_ID=test' \
            'GOOGLE_CLIENT_SECRET=test' \
            'CORS_ORIGINS=*' \
            > .env

      - name: Run E2E tests
        if: github.event_name != 'pull_request' || steps.filter.outputs.e2e_relevant == 'true'
        run: |
          TEST_MODE=${{ inputs.test_mode || 'mock' }} \
          docker compose -f docker-compose.yml -f docker-compose.test.yml \
            up --build --exit-code-from playwright playwright

      - name: Copy test results from container
        if: failure() && (github.event_name != 'pull_request' || steps.filter.outputs.e2e_relevant == 'true')
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml \
            cp playwright:/app/test-results ./playwright-results 2>/dev/null || true

      - name: Upload test results
        if: failure() && (github.event_name != 'pull_request' || steps.filter.outputs.e2e_relevant == 'true')
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-results/
          retention-days: 7

  build-images:
    name: Build & Push Images (GHCR)
    # NOTE: test-e2e intentionally NOT in this gate (2026-06-06) while we repair
    # the Playwright suite. build-images is the real pre-deploy gate (deploy ->
    # build-images), so dropping test-e2e *here* is what actually unblocks prod
    # deploys; the test-e2e job still runs for signal. Re-add 'test-e2e' here
    # (and on deploy) once the suite is green again.
    needs: [lint-backend, test-backend, test-frontend]
    runs-on: ubuntu-latest
    # Build off-box (on the GitHub-hosted runner with a big disk) and push to
    # GHCR, so the prod box only ever PULLS. Runs when we're about to deploy:
    # a push to main, OR a manual workflow_dispatch — dispatch on a feature
    # branch lets us smoke-test the GHCR push without deploying (the deploy job
    # below stays gated to refs/heads/main).
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: |
            ghcr.io/jeffeharris/my-poker-face-backend:${{ github.sha }}
            ghcr.io/jeffeharris/my-poker-face-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./react/react
          file: ./react/react/Dockerfile
          push: true
          provenance: false
          # VITE_SENTRY_DSN is a public client key (send-only) — safe to bake in.
          # Set it as a repo secret to enable session replay + the bug widget in
          # prod; absent, the app's Sentry init is a no-op.
          build-args: |
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_SENTRY_RELEASE=${{ github.sha }}
          tags: |
            ghcr.io/jeffeharris/my-poker-face-frontend:${{ github.sha }}
            ghcr.io/jeffeharris/my-poker-face-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to Production
    # Gated on build-images (which itself requires the lint/test jobs). test-e2e
    # is intentionally omitted from the deploy path while the Playwright suite is
    # being repaired — see the note on build-images above.
    needs: [lint-backend, test-backend, test-frontend, build-images]
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: read
    env:
      # Pin the exact images built by build-images for this commit.
      TAG: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v6
        with:
          clean: true

      - name: Fix production directory permissions
        run: |
          sudo chown -R $(whoami):$(whoami) /opt/poker/ 2>/dev/null || true

      - name: Sync to production directory
        run: |
          # Exclude the ENTIRE data/ dir: with --delete, a narrower 'data/*.db'
          # exclude would delete prod's data/backups/ (every snapshot, incl. the
          # rollback) and the live -wal/-shm sidecars out from under the running
          # DB. prod's data is prod's own; a deploy must never touch it.
          rsync -av --delete \
            --exclude '.git' --exclude 'node_modules' --exclude '__pycache__' \
            --exclude '.venv' --exclude 'my_poker_face_venv' --exclude '.dev' \
            --exclude 'data/' --exclude '*.pyc' \
            --exclude '.ruff_cache' --exclude '.pytest_cache' --exclude '.mypy_cache' \
            --exclude 'generated_images/' --exclude '.env' \
            ./ /opt/poker/

      - name: Decrypt secrets
        working-directory: /opt/poker
        run: |
          age -d -i $HOME/.config/age/key.txt .env.prod.age > .env

      - name: Backup database before deploy
        working-directory: /opt/poker
        run: |
          # WAL-safe backup (SQLite online-backup API + integrity_check), NOT a
          # torn plain `cp` of a live-WAL .db. This is the only safety net before
          # the one-time destructive cash-mode migrations, so a corrupt snapshot
          # must abort the deploy: backup_db.py exits non-zero on failure/integrity
          # error and `set -e` (default) fails the step. Mirrors deploy.sh (PRH-29).
          if [ -f data/poker_games.db ]; then
            python3 scripts/backup_db.py data/poker_games.db --keep 7
          else
            echo "No database file found, skipping backup"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and deploy containers
        working-directory: /opt/poker
        env:
          TAG: ${{ github.sha }}
        run: |
          # Pull the pre-built images (built off-box by build-images) instead of
          # building on the small prod disk. --no-build is a hard guarantee that
          # a deploy can never trigger an on-box build (the disk-fill failure
          # mode); if an image is missing the pull step above already failed.
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --no-build

      - name: Wait for services to start
        run: sleep 15

      - name: Run database migrations
        working-directory: /opt/poker
        run: |
          docker compose -f docker-compose.prod.yml run --rm backend python -m poker.migrations.migrate_avatars_to_db

      - name: Health check
        run: |
          curl -sf http://localhost/health || (echo "Health check failed" && exit 1)

      - name: Cleanup old Docker resources
        run: |
          docker system prune -af --filter "until=24h"

      - name: Deployment summary
        run: |
          echo "✅ Deployment complete!"
          echo "🌐 Site: https://mypokerfacegame.com"
          echo "📦 Commit: ${{ github.sha }}"
