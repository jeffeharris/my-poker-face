[tool.ruff]
# Target the lowest Python version we actually run (backend container is 3.10; CI 3.11).
target-version = "py310"
line-length = 100

# Folders/files ruff should not look at. Tests are linted but with slightly looser rules.
extend-exclude = [
    "archived_avatars",
    "output",
    ".dev",
    "my_poker_face_venv",
    "react",
    "__pycache__",
    "data",
    "*.ipynb",
    # GENERATED schema baseline (scripts/_gen_schema_baseline.py) — do not lint/format.
    "poker/repositories/schema_baseline.py",
]

[tool.ruff.lint]
# Conservative starter ruleset: real-bug rules + import sorting. Everything else can be opted
# into later once the baseline is clean.
#   E, W: pycodestyle errors/warnings (PEP 8 style)
#   F:    pyflakes (unused imports, undefined names, etc.)
#   I:    isort (import ordering)
#   B:    flake8-bugbear (subset, see ignores below) — catches common real bugs
#   UP:   pyupgrade — modern syntax for 3.10+
select = ["E", "F", "W", "I", "B", "UP"]

ignore = [
    # Handled by the formatter, not by lint:
    "E501",   # line too long
    # Allow ambiguous single-letter names — common in math/poker math code:
    "E741",
    # Bugbear's "function call in default argument" — used intentionally with Flask/FastAPI etc:
    "B008",
    # Bugbear's "loop variable not used" — too noisy on enumerate patterns:
    "B007",
    # Pyupgrade rewrites of Optional[X] -> X | None are mechanical noise; defer:
    "UP007",
    # pyupgrade: keep typing.List/Dict/Tuple imports until we explicitly migrate:
    "UP006",
    "UP035",
]

[tool.ruff.lint.per-file-ignores]
# Tests can do whatever they need: re-import, magic asserts, wildcard, etc.
# B017 (broad pytest.raises), B035 (static-key dict comp), E731 (lambda assign) are
# acceptable in test code — readability over lint purity.
"tests/**/*.py" = ["F401", "F811", "F841", "B011", "B017", "B035", "E731", "E402"]
# __init__.py: re-exports are intentional, unused imports are part of the API surface.
"**/__init__.py" = ["F401"]
# Migrations & one-off scripts: allow `print`, top-of-file imports below module logic, etc.
"scripts/**/*.py" = ["E402", "T201"]
# Experiments are throwaway analysis scripts; B023 here is a false positive (the
# closure is called within the same loop iteration, before the bound vars change).
"experiments/**/*.py" = ["E402", "B023"]
"**/migrations/**/*.py" = ["E402"]
# Flask route/handler/extension modules expose attributes for tests to patch via
# `patch('flask_app.routes.foo.bar', ...)`. Removing "unused" imports breaks those tests.
# E402 carve-out: cash_routes.py legitimately has interleaved imports below long
# section comments.
"flask_app/routes/*.py" = ["F401", "E402"]
"flask_app/handlers/*.py" = ["F401", "F811"]
"flask_app/extensions.py" = ["F401"]
# Re-export shim modules: imports intentionally placed below sectioning comments.
"poker/player_psychology.py" = ["E402"]
"cash_mode/prestige.py" = ["E402"]
# Modules whose imports must follow runtime initialization (load_dotenv, sys.path setup).
"flask_app/config.py" = ["E402"]
"populate_personalities_db.py" = ["E402"]
"backup_personalities.py" = ["E402"]
"bin/*.py" = ["E402"]

[tool.ruff.lint.isort]
# Treat first-party packages as local imports.
known-first-party = ["poker", "flask_app", "core", "experiments"]
combine-as-imports = true

[tool.ruff.format]
# Don't touch quote style — codebase is ~50/50 single vs double and we don't want a giant
# reformat diff. Revisit later if we want consistency.
quote-style = "preserve"
indent-style = "space"
line-ending = "lf"
docstring-code-format = false
