services:
  # Flask/SocketIO backend server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "true"
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./data:/app/data
      - ./poker:/app/poker
      - ./flask_app:/app/flask_app
      - ./core:/app/core
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FLASK_APP=flask_app.ui_web
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379
      - ENABLE_AI_DEBUG=${ENABLE_AI_DEBUG:-false}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FRONTEND_URL=http://localhost:${FRONTEND_PORT:-5173}
      - IMAGE_PROVIDER=${IMAGE_PROVIDER:-openai}
      - IMAGE_MODEL=${IMAGE_MODEL:-}
      - POLLINATIONS_API_KEY=${POLLINATIONS_API_KEY:-}
      - RUNWARE_API_KEY=${RUNWARE_API_KEY:-}
      # Cash-economy / circuit feature flags now come from the central registry
      # (core/feature_flags.py) with per-env defaults — they no longer need to be
      # set here or in .env. The dev defaults (CHIP_CUSTODY_*, RENOWN_V2_*,
      # PRESTIGE_SEEKING, TOURNAMENT_*) resolve ON for env=dev; the Director
      # thermostat (GENESIS/RAKE_RESERVE/DIRECTOR_POLICY/VICE_RESERVE/CASINO_RESEED)
      # resolves OFF in dev / ON in prod. Override any one ad hoc by setting its
      # env var. See docs/guides/FEATURE_FLAGS.md; check with `scripts/flags.py status`.
      # Redirect tool caches OUT of the bind-mounted repo. The per-worktree
      # docker-compose.override.yml mounts `.:/app`, and `make test` runs
      # pytest/ruff in-container as root — which otherwise leaves root-owned
      # .ruff_cache/.pytest_cache in the HOST worktree, breaking the host's
      # pre-commit/pre-push hook (ruff can't write its cache as the host user).
      # /tmp is container-internal (not mounted), so these stay ephemeral.
      - RUFF_CACHE_DIR=/tmp/.ruff_cache
      - PYTEST_ADDOPTS=-o cache_dir=/tmp/.pytest_cache
    env_file:
      - .env
    command: python -m flask_app.ui_web
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - poker-network

  # React frontend development server
  frontend:
    build:
      context: ./react/react
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./react/react:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      # VITE_BACKEND_PORT tells frontend which host port to use for API calls
      - VITE_BACKEND_PORT=${BACKEND_PORT:-5000}
      - VITE_ENABLE_DEBUG=${ENABLE_DEBUG:-false}
      - VITE_ENABLE_AI_DEBUG=${ENABLE_AI_DEBUG:-false}
      # Sentry (session replay + bug-report widget). Empty => Sentry stays off.
      - VITE_SENTRY_DSN=${VITE_SENTRY_DSN:-}
    depends_on:
      - backend
    command: sh -c "rm -rf node_modules/.vite* && npm run dev -- --host 0.0.0.0"
    networks:
      - poker-network

  # Redis for session management (optional, for future scaling)
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - poker-network

  # Nginx reverse proxy (optional, for production-like setup)
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - poker-network
    profiles:
      - production


volumes:
  redis-data:
    driver: local

networks:
  poker-network:
    driver: bridge
    # Pin a dedicated subnet so this worktree's network doesn't collide with the
    # other my-poker-face worktrees (desktop .45 / main .46 / circuit .47) when
    # Docker's default address pool is exhausted. See the desktop-parity fix.
    ipam:
      config:
        - subnet: 10.123.48.0/24
