server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers (PRH-39) -----------------------------------------
    # Applied at the server level so they cover both the SPA and the proxied
    # /api + /socket.io responses (the inner locations set no add_header of
    # their own, so these are inherited). `always` includes error responses.
    #
    # Clickjacking: frame-ancestors 'none' (modern) + X-Frame-Options (legacy).
    # nosniff stops MIME-sniffing of API/JSON + script responses.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    # CSP: frame-ancestors/object-src/base-uri are the high-value, zero-breakage
    # directives. script-src/style-src keep 'unsafe-inline' because index.html
    # ships inline bootstrap scripts + Vite/Tailwind inject inline styles;
    # tightening these (nonces/hashes or bundling the inline scripts) is the
    # documented PRH-39 follow-up. img-src is permissive for avatar/data URLs;
    # connect-src allows the same-origin API + Socket.IO (ws/wss).
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: blob: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss:" always;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy (when using nginx in production)
    location /api {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket proxy for Socket.IO
    location /socket.io {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
