services:
  backend:
    hostname: poker-backend
    # Prod pulls this pre-built image from GHCR (built off-box by the
    # build-images CI job) so the small prod disk never carries build cache or
    # transient layers. TAG is the deploying commit's SHA (set by the deploy
    # job); falls back to :latest for manual `docker compose pull`. The build:
    # block is kept as a fallback so deploy.sh / `up -d --build` still work.
    image: ghcr.io/jeffeharris/my-poker-face-backend:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Cap backend RAM so a runaway/leak recycles ONLY the backend instead of
    # letting the kernel OOM-kill a random container on this small (1.9G) box.
    # Steady state is ~770M; 1200m leaves growth headroom but bounds it.
    mem_limit: 1200m
    mem_reservation: 768m
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - PYTHONUNBUFFERED=1
      # PRH-35: machine-parseable JSON logs (request_id on every line) for
      # shipping to an aggregator. Set LOG_FORMAT= (empty) for human-readable.
      - LOG_FORMAT=${LOG_FORMAT:-json}
      # PRH-40: run the container as the non-root appuser. The entrypoint
      # chowns the bind-mounted data volume then drops privileges via gosu.
      - DROP_PRIVILEGES=1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - POLLINATIONS_API_KEY=${POLLINATIONS_API_KEY:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FLASK_APP=flask_app.ui_web
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=https://mypokerfacegame.com,https://www.mypokerfacegame.com
      - LLM_PROMPT_CAPTURE=${LLM_PROMPT_CAPTURE:-all}
      # PRH-32: finite retention for the verbatim prompt captures (full prompts
      # incl. user chat). Was 0 (kept forever) — default to 30 days; override
      # via host env. The scheduled cleanup enforces it.
      - LLM_PROMPT_RETENTION_DAYS=${LLM_PROMPT_RETENTION_DAYS:-30}
      # PRH-32: finite retention for api_usage cost rows (aggregates are kept
      # via the rollup; raw rows past this are purged on a schedule).
      - API_USAGE_RETENTION_DAYS=${API_USAGE_RETENTION_DAYS:-90}
      # Sentry backend error monitoring. Empty => Sentry init is a no-op.
      - SENTRY_DSN=${SENTRY_DSN:-}
      # PRH-30: per-decision equity Monte Carlo iterations (analytics only, not
      # the bot's actual decision). Lower than the 2000 default to raise the
      # single-worker concurrent-hands ceiling; override via host env.
      # Scaling Stage 0: 500 -> 250 to halve the per-decision CPU burst (still
      # analytics-only; no gameplay impact).
      - DECISION_ANALYSIS_ITERATIONS=${DECISION_ANALYSIS_ITERATIONS:-250}
      # WebSocket transport: gevent is the standards-aligned async_mode under the
      # gevent-websocket gunicorn worker. Prod evidence (2026-06-08) showed
      # threading produced a 1002 protocol error + clients stuck on long-polling
      # (0 ws upgrades); under gevent a sid handshake completes 101 Switching
      # Protocols cleanly. Overrides the threading default in flask_app/config.py.
      - SOCKETIO_ASYNC_MODE=${SOCKETIO_ASYNC_MODE:-gevent}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FRONTEND_URL=https://mypokerfacegame.com
      - IMAGE_PROVIDER=${IMAGE_PROVIDER:-openai}
      - IMAGE_MODEL=${IMAGE_MODEL:-}
      - RUNWARE_API_KEY=${RUNWARE_API_KEY:-}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-}
      # PRH-25: arm the LLM spend kill-switch in prod. Global is the hard
      # backstop (the only ceiling a guest can't reset); per-owner caps any
      # single signed-in user. Armed by default here so a fresh deploy is never
      # unbounded; override via host env.
      - LLM_GLOBAL_DAILY_BUDGET_USD=${LLM_GLOBAL_DAILY_BUDGET_USD:-50}
      - LLM_PER_OWNER_DAILY_BUDGET_USD=${LLM_PER_OWNER_DAILY_BUDGET_USD:-5}
      # PRH-28: alert destination for ERROR-level logs + [LEDGER]/[LLM BUDGET]
      # signals. Slack-compatible webhook (Discord works via the /slack suffix).
      # Unset = log-only (no-op handler).
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      # ─── Cash-economy / circuit feature flags ───
      # Now resolved by the central registry (core/feature_flags.py) with per-env
      # defaults. On prod (FLASK_ENV=production → env=prod) the launch set resolves
      # ON automatically and no longer needs arming here: TOURNAMENT_CIRCUIT/DRAW,
      # CHIP_CUSTODY_ENABLED/DERIVE_READS, RENOWN_V2_ENABLED/PERSIST_AI,
      # PRESTIGE_SEEKING, and the Director thermostat (GENESIS_RESERVE_ENABLED,
      # RAKE_RESERVE_GATED, DIRECTOR_POLICY_HOLD, VICE_RESERVE_GATED,
      # CASINO_RESEED_ON_SPENT). Verify with `scripts/flags.py status --env prod`;
      # see docs/guides/FEATURE_FLAGS.md. To override one ad hoc, re-add its env line.
      #
      # GENESIS_RESERVE_RATIO is a numeric tunable (not a boolean flag), so it stays.
      - GENESIS_RESERVE_RATIO=${GENESIS_RESERVE_RATIO:-0.05}
    command: gunicorn -k geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 -b 0.0.0.0:5000 --timeout 120 "flask_app.ui_web:create_app()"
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - poker-network
      - web

  frontend:
    hostname: poker-frontend
    # See backend note: pulled pre-built from GHCR; build: kept as fallback.
    image: ghcr.io/jeffeharris/my-poker-face-frontend:${TAG:-latest}
    build:
      context: ./react/react
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      # Probe 127.0.0.1, not localhost: in-container `localhost` resolves to ::1
      # first, but nginx binds IPv4 only (`listen 80;`) → the probe gets
      # connection-refused while real traffic is served fine (false "unhealthy").
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - poker-network
      - web

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - poker-network


volumes:
  redis-data:

networks:
  poker-network:
    driver: bridge
  web:
    external: true
